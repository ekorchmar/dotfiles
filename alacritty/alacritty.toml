general.import = [
  "~/.config/alacritty/catppuccin-mocha.toml",
]

[env]

[window]
dimensions.columns = 120
dimensions.lines = 32
padding.x = 3
opacity = 0.8
blur = true
level = "AlwaysOnTop"

[font]
normal.family = "FiraCode Nerd Font"
size = 13
builtin_box_drawing = false

[bell]
animation = "EaseOutQuad"
duration = 150
color = "#111111"
